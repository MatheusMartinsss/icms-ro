name: Deploy

on:
  push:
    branches: [feat/nuvemFiscal]

env:
  REGISTRY: registry.gflona.com.br

jobs:
  # ── 1. Build e push para o registry próprio ───────────────────────────────
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE: ${{ secrets.REGISTRY_HOST }}/icms-ro

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          build-args: |
            DATABASE_URL=postgresql://x:x@localhost/x
            NEXT_PUBLIC_GOOGLE_API_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_API_KEY }}
            NEXT_PUBLIC_GOOGLE_API_URL=${{ secrets.NEXT_PUBLIC_GOOGLE_API_URL }}
            NEXT_PUBLIC_DARE_API_URL=${{ secrets.NEXT_PUBLIC_DARE_API_URL }}

  # ── 2. Deploy no VPS ──────────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          envs:     REGISTRY_HOST
          script: |
            set -e
            cd /opt/icms-ro

            docker compose pull app
            docker compose up -d --no-build app
            docker image prune -f
  
